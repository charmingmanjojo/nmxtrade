function tick(){
  SYMS.forEach(s=>{

    prices[s]=Math.max(0.01,+(prices[s]*(1+co.t)+(priceRng()-0.49)*prices[s]*co.v).toFixed(2));
  });
}

function genCandles(sym,n=90){
  const co=ALL[sym];
  const r=mkRng(sym.split('').reduce((a,c)=>a+c.charCodeAt(0),0));
  let p=co.b*(0.82+r()*0.06);
  return Array.from({length:n},(_,i)=>{
    const t=i/n;
    let drift=co.v*0.18;
    if(co.recovery&&t>co.recovery)drift=co.v*2.2;
    const open=p;
    const mv=(r()-0.48)*p*co.v*4+p*drift*0.06;
    const close=Math.max(open*0.85,open+mv);
    const rng2=Math.abs(close-open)*(0.4+r()*1.1);
    const high=Math.max(open,close)+r()*rng2*0.55;
    const low=Math.min(open,close)-r()*rng2*0.35;
    p=close;
    return{o:+open.toFixed(2),h:+Math.max(high,open,close).toFixed(2),l:+Math.max(0.01,Math.min(low,open,close)).toFixed(2),c:+close.toFixed(2),v:Math.floor(5e4+r()*1.4e6),i};
  }).map((c,i,a)=>i===a.length-1?{...c,c:co.b}:c);
}

function renderChart(co,px,chg){
  const candles=genCandles(selectedSym,90);
  const H=180,W=800,pad={l:48,r:12,t:12,b:24};
  const cW=(W-pad.l-pad.r)/candles.length-1;
  const highs=candles.map(c=>c.h),lows=candles.map(c=>c.l);
  const yMax=Math.max(...highs)*1.02,yMin=Math.min(...lows)*0.98;
  const yS=(H-pad.t-pad.b)/(yMax-yMin);
  const yP=v=>pad.t+(yMax-v)*yS;
  const xP=i=>pad.l+i*(cW+1)+cW/2;
  // Price line overlay (last real-time price)
  const lastC={...candles[candles.length-1],c:px};
  const allC=[...candles.slice(0,-1),lastC];

  let svg=`<svg id="candle-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">`;
  // Grid
  for(let i=0;i<4;i++){const y=pad.t+i*((H-pad.t-pad.b)/3);svg+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#0d1218" stroke-width="1"/>`;const v=yMax-(i*(yMax-yMin)/3);svg+=`<text x="${pad.l-4}" y="${y+4}" fill="#374151" font-size="8" text-anchor="end" font-family="Courier New">$${v.toFixed(0)}</text>`;}
  // Candles
  allC.forEach((c,i)=>{
    const isUp=c.c>=c.o;const col=isUp?'#22c55e':'#ef4444';
    const x=xP(i);
    svg+=`<line x1="${x}" y1="${yP(c.h)}" x2="${x}" y2="${yP(c.l)}" stroke="${col}" stroke-width="1"/>`;
    const top=yP(Math.max(c.o,c.c)),bot=yP(Math.min(c.o,c.c)),ht=Math.max(1,bot-top);
    svg+=`<rect x="${xP(i)-cW/2}" y="${top}" width="${cW}" height="${ht}" fill="${col}" opacity="0.85"/>`;
  });
  // Current price line
  svg+=`<line x1="${pad.l}" y1="${yP(px)}" x2="${W-pad.r}" y2="${yP(px)}" stroke="#e8b84b" stroke-width="0.5" stroke-dasharray="3,3"/>`;
  svg+=`<text x="${W-pad.r+2}" y="${yP(px)+4}" fill="#e8b84b" font-size="8" font-family="Courier New">$${fmtN(px)}</text>`;
  svg+='</svg>';
  return svg;
}

function bindApp(){
  // Nav
  document.getElementById('nav-logout').onclick=()=>{currentUser=null;render();};
  const portBtn=document.getElementById('nav-port-btn');
  if(portBtn)portBtn.onclick=()=>{chartTab=chartTab==='PORTFOLIO'?'CHART':'PORTFOLIO';render();};
  const adminBtn=document.getElementById('nav-admin-btn');
  if(adminBtn)adminBtn.onclick=()=>{chartTab=chartTab==='ADMIN'?'CHART':'ADMIN';render();};

  // Sidebar search
  const sbq=document.getElementById('sb-q');
  if(sbq)sbq.oninput=e=>{sidebarSearch=e.target.value;render();};

  // Sidebar filter
  document.querySelectorAll('.sf-btn').forEach(b=>b.onclick=()=>{sidebarFilter=b.dataset.f;render();});

  // Watchlist click
  document.querySelectorAll('.wl-row').forEach(r=>r.onclick=()=>{
    selectedSym=r.dataset.sym;
    if(chartTab==='ADMIN'||chartTab==='PORTFOLIO')chartTab='CHART';
    orderShares='';orderMsg=null;render();
  });

  // Chart tabs
  document.querySelectorAll('.ct-btn').forEach(b=>b.onclick=()=>{chartTab=b.dataset.ct;render();});

  // Chart content swap (news/info)
  if(chartTab==='NEWS'&&document.getElementById('chart-area')){
    document.getElementById('chart-area').innerHTML=renderNews(ALL[selectedSym]);
  } else if(chartTab==='INFO'&&document.getElementById('chart-area')){
    document.getElementById('chart-area').innerHTML=renderInfo(ALL[selectedSym],prices[selectedSym]);
  }

  // Order dir tabs
  document.querySelectorAll('[data-dir]').forEach(b=>b.onclick=()=>{orderDir=b.dataset.dir;orderMsg=null;render();});

  // Shares input
  const opSh=document.getElementById('op-shares');
  if(opSh){opSh.oninput=e=>{orderShares=e.target.value;render();};}

  // Submit order
  const opSub=document.getElementById('op-submit');
  if(opSub)opSub.onclick=()=>{
    const user=db.users[currentUser];
    const shares=Math.floor(parseFloat(orderShares)||0);
    const px=prices[selectedSym];
    if(shares<=0){orderMsg={type:'err',text:'Enter a valid number of shares.'};render();return;}
    if(orderDir==='buy'){
      const total=shares*px;
      if(total>user.cash){orderMsg={type:'err',text:`Insufficient funds. Need $${fmtN(total)}, have $${fmtN(user.cash)}.`};render();return;}
      user.cash=+(user.cash-total).toFixed(2);
      if(!user.pos[selectedSym])user.pos[selectedSym]={sh:0,avg:0};
      const existing=user.pos[selectedSym];
      existing.avg=(existing.sh*existing.avg+shares*px)/(existing.sh+shares);
      existing.sh+=shares;
      user.txs.push({id:uid(),type:'BUY',sym:selectedSym,sh:shares,px,total,ts:Date.now()});
      orderMsg={type:'ok',text:`Bought ${shares.toLocaleString()} ${selectedSym} @ $${fmtN(px)}.`};
    } else {
      if(!user.pos[selectedSym]||user.pos[selectedSym].sh<shares){orderMsg={type:'err',text:`You only have ${(user.pos[selectedSym]?.sh||0).toLocaleString()} shares.`};render();return;}
      const total=shares*px;
      user.cash=+(user.cash+total).toFixed(2);
      user.pos[selectedSym].sh-=shares;
      if(user.pos[selectedSym].sh===0)delete user.pos[selectedSym];
      user.txs.push({id:uid(),type:'SELL',sym:selectedSym,sh:shares,px,total,ts:Date.now()});
      orderMsg={type:'ok',text:`Sold ${shares.toLocaleString()} ${selectedSym} @ $${fmtN(px)}.`};
    }
    saveDB(db);orderShares='';render();
  };

  // Close position
  document.querySelectorAll('.close-btn').forEach(b=>b.onclick=()=>{
    const sym=b.dataset.close;
    const user=db.users[currentUser];
    const pos=user.pos[sym];
    if(!pos||pos.sh<=0)return;
    const px=prices[sym];const total=pos.sh*px;
    user.cash=+(user.cash+total).toFixed(2);
    user.txs.push({id:uid(),type:'SELL',sym,sh:pos.sh,px,total,ts:Date.now()});
    delete user.pos[sym];
    saveDB(db);render();
  });

  // Position tabs
  document.querySelectorAll('[data-ptab]').forEach(b=>b.onclick=()=>{posTab=b.dataset.ptab;render();});

  // Admin actions
  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.onclick=()=>{
      const action=btn.dataset.action;
      const target=btn.dataset.target;
      const u=db.users[target];
      if(!u)return;
      const inp=adminInputs[target];
      const amt=parseFloat(inp)||0;
      if(action==='set'&&amt>=0){u.cash=+amt.toFixed(2);}
      else if(action==='add'&&amt>0){u.cash=+(u.cash+amt).toFixed(2);}
      else if(action==='sub'&&amt>0){u.cash=Math.max(0,+(u.cash-amt).toFixed(2));}
      else if(action==='reset'){u.cash=100000;}
      else if(action==='promote'){u.isAdmin=true;}
      else if(action==='demote'){u.isAdmin=false;}
      else if(action==='delete'){if(confirm(`Delete user ${target}?`)){delete db.users[target];}}
      saveDB(db);render();
    };
  });

  // Admin input tracking
  document.querySelectorAll('[data-au]').forEach(inp=>{
    inp.oninput=e=>{adminInputs[e.target.dataset.au]=e.target.value;};
  });

  // Admin create user
  const newCreate=document.getElementById('new-create');
  if(newCreate)newCreate.onclick=()=>{
    const u=document.getElementById('new-u').value.trim().toLowerCase();
    const n=document.getElementById('new-n').value.trim();
    const p=document.getElementById('new-p').value;
    const c=parseFloat(document.getElementById('new-c').value)||100000;
    if(!u||!n||!p){document.getElementById('new-msg').textContent='All fields required.';document.getElementById('new-msg').style.color='var(--red)';return;}
    if(db.users[u]){document.getElementById('new-msg').textContent='Username taken.';document.getElementById('new-msg').style.color='var(--red)';return;}
    db.users[u]={u,p,name:n,isAdmin:false,cash:c,pos:{},txs:[],joined:Date.now()};
    saveDB(db);
    document.getElementById('new-msg').textContent=`Created user @${u} with $${fmtN(c)}.`;
    document.getElementById('new-msg').style.color='var(--green)';
    render();
  };
}

// ═══════════════════════════════════════════════
//  TICK LOOP — smart partial DOM updates only.
//  NEVER re-renders the login screen.
// ═══════════════════════════════════════════════
tick();

function tickUpdate(){
  tick();
  if(!currentUser) return; // never touch login DOM

  if(chartTab==='ADMIN'||chartTab==='PORTFOLIO') return;

  // Watchlist prices
  document.querySelectorAll('.wl-row[data-sym]').forEach(row=>{
    const s=row.dataset.sym;
    const p=prices[s],o=opens[s],c=pct(p,o);
    const cls=c>=0?'up':'dn';
    const pe=row.querySelector('.wl-price');
    const ce=row.querySelector('.wl-pct');
    if(pe) pe.textContent='$'+fmtN(p);
    if(ce){ce.textContent=pctS(c);ce.className='wl-pct '+cls;}
  });

  // Sym header
  const sp=document.querySelector('.sym-price');
  if(sp){
    const p=prices[selectedSym],o=opens[selectedSym],c=pct(p,o);
    sp.textContent='$'+fmtN(p);
    const sc=document.querySelector('.sym-chg');
    if(sc){sc.textContent=pctS(c);sc.className='sym-chg '+(c>=0?'up':'dn');}
  }

  // Nav cash
  const nc=document.querySelector('.nav-cash b');
  if(nc&&db.users[currentUser]) nc.textContent='$'+fmtN(db.users[currentUser].cash);

  // NMX index
  const topS=['STI','BCII','BCOR','NDX','VTGS','MREN','CSTL','APBX','RXON','HAIM','GNSS','HDRN','SPRT','TNSK','SHVN','RVLT','MNRL','PTHR','WVLK'];
  const nmxPx=topS.reduce((a,s)=>a+(prices[s]||0),0)/topS.length;
  const nmxO=topS.reduce((a,s)=>a+(opens[s]||0),0)/topS.length;
  const nmxC=pct(nmxPx,nmxO);
  const idxEl=document.querySelector('.nav-idx');
  if(idxEl){
    const sp2=idxEl.querySelectorAll('span');
    if(sp2[1]) sp2[1].textContent='$'+fmtN(nmxPx);
    if(sp2[2]){sp2[2].textContent=pctS(nmxC);sp2[2].style.color=nmxC>=0?'var(--green)':'var(--red)';}
  }

  // Tape
  const ti=document.querySelector('.tape-inner');
  if(ti){
    const ts=SYMS.slice(0,40).map(s=>{
      const p=prices[s],o=opens[s],c=pct(p,o),cls=c>=0?'up':'dn';
      return `<span class="ti ${cls}"><b>${s}</b> ${fmtN(p)} <span class="${cls}">${pctS(c)}</span></span>`;
    }).join('');
    ti.innerHTML=ts+ts;
  }

  // Candle chart redraw
  if(chartTab==='CHART'){
    const ca=document.getElementById('chart-area');
    if(ca&&ca.querySelector('#candle-chart')){
      const co=ALL[selectedSym],px=prices[selectedSym],op=opens[selectedSym],chg=pct(px,op);
      ca.innerHTML=renderChart(co,px,chg);
    }
  }

  // Positions P&L
  const user=db.users[currentUser];
  document.querySelectorAll('.pos-table tbody tr').forEach(row=>{
    const se=row.querySelector('td:first-child span');
    if(!se) return;
    const sym=se.textContent.trim();
    const pos=user.pos[sym];
    if(!pos||!prices[sym]) return;
    const cp=prices[sym],gl=(cp-pos.avg)*pos.sh;
    const cells=row.querySelectorAll('td');
    if(cells[3]) cells[3].textContent='$'+fmtN(cp);
    if(cells[4]) cells[4].textContent='$'+fmtN(cp*pos.sh);
    if(cells[5]){cells[5].textContent=fmt$(gl);cells[5].className=gl>=0?'up':'dn';}
  });
}

setInterval(tickUpdate,1500);

render();
</script>
