function genCandles(sym,n=90){
  const co=ALL[sym];const r=mkRng(sym.split('').reduce((a,c)=>a+c.charCodeAt(0),0));
  let p=co.b*(0.82+r()*0.06);
  return Array.from({length:n},(_,i)=>{
    const t=i/n;let drift=co.v*0.18;
    if(co.recovery&&t>co.recovery)drift=co.v*2.2;
    const open=p,mv=(r()-0.48)*p*co.v*4+p*drift*0.06,close=Math.max(open*0.85,open+mv);
    const rng2=Math.abs(close-open)*(0.4+r()*1.1);
    const high=Math.max(open,close)+r()*rng2*0.55,low=Math.min(open,close)-r()*rng2*0.35;
    p=close;
    return{o:+open.toFixed(2),h:+Math.max(high,open,close).toFixed(2),l:+Math.max(0.01,Math.min(low,open,close)).toFixed(2),c:+close.toFixed(2),v:Math.floor(5e4+r()*1.4e6),i};
  }).map((c,i,a)=>i===a.length-1?{...c,c:co.b}:c);
}

async function loadUserData(userId) {
  const [profRes, posRes, txRes] = await Promise.all([
    sb.from('profiles').select('*').eq('id', userId).single(),
    sb.from('positions').select('*').eq('user_id', userId),
    sb.from('transactions').select('*').eq('user_id', userId).order('created_at', {ascending: false}).limit(100)
  ]);
  currentProfile = profRes.data;
  userPositions = {};
  (posRes.data || []).forEach(p => { if(p.shares > 0) userPositions[p.symbol] = {shares: p.shares, avg_price: p.avg_price, id: p.id}; });
  userTransactions = txRes.data || [];
}

async function loadAllProfiles() {
  const { data } = await sb.from('profiles').select('*').order('created_at');
  allProfiles = data || [];
}

async function savePosition(symbol, shares, avgPrice) {
  const existing = userPositions[symbol];
  if (shares <= 0) {
    if (existing?.id) await sb.from('positions').delete().eq('id', existing.id);
    delete userPositions[symbol];
  } else {
    if (existing?.id) {
      await sb.from('positions').update({shares, avg_price: avgPrice, updated_at: new Date()}).eq('id', existing.id);
    } else {
      const { data } = await sb.from('positions').insert({user_id: currentUser.id, symbol, shares, avg_price: avgPrice}).select().single();
      if(data) userPositions[symbol] = {shares, avg_price: avgPrice, id: data.id};
    }
    if(userPositions[symbol]) { userPositions[symbol].shares = shares; userPositions[symbol].avg_price = avgPrice; }
  }
}

async function saveCash(amount) {
  await sb.from('profiles').update({cash: amount}).eq('id', currentUser.id);
  currentProfile.cash = amount;
}

async function saveTransaction(type, symbol, shares, price, total) {
  const { data } = await sb.from('transactions').insert({
    user_id: currentUser.id, type, symbol, shares, price, total
  }).select().single();
  if(data) userTransactions.unshift(data);
}

async function adminUpdateCash(userId, amount) {
  await sb.from('profiles').update({cash: amount}).eq('id', userId);
  const p = allProfiles.find(x => x.id === userId);
  if(p) p.cash = amount;
}

async function adminSetAdmin(userId, isAdmin) {
  await sb.from('profiles').update({is_admin: isAdmin}).eq('id', userId);
  const p = allProfiles.find(x => x.id === userId);
  if(p) p.is_admin = isAdmin;
}

async function doLogin(email, password) {
  authLoading = true; authMsg = null; render();
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  authLoading = false;
  if (error) { authMsg = {type:'err', text: error.message}; render(); return; }
  currentUser = data.user;
  await loadUserData(currentUser.id);
  appLoading = false;
  render();
}

async function doRegister(email, password, username, displayName) {
  authLoading = true; authMsg = null; render();
  // Check username not taken
  const { data: existing } = await sb.from('profiles').select('id').eq('username', username.toLowerCase()).maybeSingle();
  if (existing) { authLoading = false; authMsg = {type:'err', text:'Username already taken.'}; render(); return; }
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { username: username.toLowerCase(), display_name: displayName, is_admin: false, cash: 100000 } }
  });
  authLoading = false;
  if (error) { authMsg = {type:'err', text: error.message}; render(); return; }
  // Some Supabase configs require email confirmation
  if (data.user && !data.session) {
    authMsg = {type:'ok', text:'Account created! Check your email to confirm, then sign in.'}; render(); return;
  }
  if (data.session) {
    currentUser = data.user;
    // Brief wait for trigger to create profile
    await new Promise(r => setTimeout(r, 800));
    await loadUserData(currentUser.id);
    appLoading = false; render();
  }
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; currentProfile = null; userPositions = {}; userTransactions = [];
  authMode = 'login'; authMsg = null;
  render();
}

function bindAuth() {
  document.getElementById('a-toggle').onclick = () => { authMode = authMode==='login'?'register':'login'; authMsg=null; render(); };
  const btn = document.getElementById('a-btn');
  if (!btn) return;

  const go = async () => {
    const email = (document.getElementById('a-email')?.value||'').trim();
    const pass = (document.getElementById('a-pass')?.value||'');
    if (authMode === 'login') {
      if (!email || !pass) { authMsg={type:'err',text:'Email and password required.'}; render(); return; }
      await doLogin(email, pass);
    } else {
      const user = (document.getElementById('a-user')?.value||'').trim().toLowerCase().replace(/\s+/g,'');
      const name = (document.getElementById('a-name')?.value||'').trim();
      if (!user || user.length < 2) { authMsg={type:'err',text:'Username must be at least 2 characters.'}; render(); return; }
      if (!name) { authMsg={type:'err',text:'Display name required.'}; render(); return; }
      if (!email) { authMsg={type:'err',text:'Email required.'}; render(); return; }
      if (pass.length < 6) { authMsg={type:'err',text:'Password must be at least 6 characters.'}; render(); return; }
      await doRegister(email, pass, user, name);
    }
  };

  btn.onclick = go;
  document.getElementById('a-pass').onkeydown = e => { if(e.key==='Enter') go(); };
}

function renderChart(co,px,chg){
  const candles=genCandles(selectedSym,90);
  const H=180,W=800,pad={l:48,r:12,t:12,b:24};
  const cW=(W-pad.l-pad.r)/candles.length-1;
  const highs=candles.map(c=>c.h),lows=candles.map(c=>c.l);
  const yMax=Math.max(...highs)*1.02,yMin=Math.min(...lows)*0.98;
  const yS=(H-pad.t-pad.b)/(yMax-yMin);
  const yP=v=>pad.t+(yMax-v)*yS;
  const xP=i=>pad.l+i*(cW+1)+cW/2;
  const allC=[...candles.slice(0,-1),{...candles[candles.length-1],c:px}];
  let svg=`<svg id="candle-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">`;
  for(let i=0;i<4;i++){const y=pad.t+i*((H-pad.t-pad.b)/3);svg+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#0d1218" stroke-width="1"/>`;const v=yMax-(i*(yMax-yMin)/3);svg+=`<text x="${pad.l-4}" y="${y+4}" fill="#374151" font-size="8" text-anchor="end" font-family="Courier New">$${v.toFixed(0)}</text>`;}
  allC.forEach((c,i)=>{
    const isUp=c.c>=c.o,col=isUp?'#22c55e':'#ef4444',x=xP(i);
    svg+=`<line x1="${x}" y1="${yP(c.h)}" x2="${x}" y2="${yP(c.l)}" stroke="${col}" stroke-width="1"/>`;
    const top=yP(Math.max(c.o,c.c)),bot=yP(Math.min(c.o,c.c)),ht=Math.max(1,bot-top);
    svg+=`<rect x="${xP(i)-cW/2}" y="${top}" width="${cW}" height="${ht}" fill="${col}" opacity="0.85"/>`;
  });
  svg+=`<line x1="${pad.l}" y1="${yP(px)}" x2="${W-pad.r}" y2="${yP(px)}" stroke="#e8b84b" stroke-width="0.5" stroke-dasharray="3,3"/>`;
  svg+=`<text x="${W-pad.r+2}" y="${yP(px)+4}" fill="#e8b84b" font-size="8" font-family="Courier New">$${fmtN(px)}</text>`;
  svg+='</svg>';
  return svg;
}

function bindApp(){
  document.getElementById('nav-logout').onclick = () => doLogout();
  const portBtn = document.getElementById('nav-port-btn');
  if(portBtn) portBtn.onclick = () => { chartTab=chartTab==='PORTFOLIO'?'CHART':'PORTFOLIO'; render(); };
  const adminBtn = document.getElementById('nav-admin-btn');
  if(adminBtn) adminBtn.onclick = () => {
    if(chartTab!=='ADMIN'){ loadAllProfiles().then(()=>render()); }
    chartTab = chartTab==='ADMIN'?'CHART':'ADMIN';
    render();
  };

  const sbq = document.getElementById('sb-q');
  if(sbq) sbq.oninput = e => { sidebarSearch=e.target.value; render(); };

  document.querySelectorAll('.sf-btn').forEach(b=>b.onclick=()=>{sidebarFilter=b.dataset.f;render();});
  document.querySelectorAll('.wl-row').forEach(r=>r.onclick=()=>{
    selectedSym=r.dataset.sym;
    if(chartTab==='ADMIN'||chartTab==='PORTFOLIO') chartTab='CHART';
    orderShares='';orderMsg=null;render();
  });
  document.querySelectorAll('.ct-btn').forEach(b=>b.onclick=()=>{
    chartTab=b.dataset.ct;render();
    if(chartTab==='NEWS') document.getElementById('chart-area').innerHTML=renderNews(ALL[selectedSym]);
    if(chartTab==='INFO') document.getElementById('chart-area').innerHTML=renderInfo(ALL[selectedSym],prices[selectedSym]);
  });
  document.querySelectorAll('[data-dir]').forEach(b=>b.onclick=()=>{orderDir=b.dataset.dir;orderMsg=null;render();});

  const opSh = document.getElementById('op-shares');
  if(opSh) opSh.oninput = e => { orderShares=e.target.value; render(); };

  const opSub = document.getElementById('op-submit');
  if(opSub) opSub.onclick = async () => {
    const shares = Math.floor(parseFloat(orderShares)||0);
    const px = prices[selectedSym];
    if(shares<=0){orderMsg={type:'err',text:'Enter a valid number of shares.'};render();return;}
    opSub.disabled=true;opSub.textContent='...';
    if(orderDir==='buy'){
      const total=shares*px;
      if(total>currentProfile.cash){orderMsg={type:'err',text:`Need $${fmtN(total)}, have $${fmtN(currentProfile.cash)}.`};render();return;}
      const newCash=+(currentProfile.cash-total).toFixed(2);
      const existing=userPositions[selectedSym];
      const newShares=(existing?.shares||0)+shares;
      const newAvg=existing?((existing.shares*existing.avg_price+shares*px)/newShares):px;
      await Promise.all([saveCash(newCash),savePosition(selectedSym,newShares,+newAvg.toFixed(4)),saveTransaction('BUY',selectedSym,shares,px,total)]);
      orderMsg={type:'ok',text:`Bought ${shares.toLocaleString()} ${selectedSym} @ $${fmtN(px)}.`};
    } else {
      const existing=userPositions[selectedSym];
      if(!existing||existing.shares<shares){orderMsg={type:'err',text:`You only have ${existing?.shares||0} shares.`};render();return;}
      const total=+(shares*px).toFixed(2);
      const newCash=+(currentProfile.cash+total).toFixed(2);
      const newShares=existing.shares-shares;
      await Promise.all([saveCash(newCash),savePosition(selectedSym,newShares,existing.avg_price),saveTransaction('SELL',selectedSym,shares,px,total)]);
      orderMsg={type:'ok',text:`Sold ${shares.toLocaleString()} ${selectedSym} @ $${fmtN(px)}.`};
    }
    orderShares='';render();
  };

  document.querySelectorAll('.close-btn').forEach(b=>b.onclick=async()=>{
    const sym=b.dataset.close;const pos=userPositions[sym];if(!pos||pos.shares<=0)return;
    const px=prices[sym],total=+(pos.shares*px).toFixed(2),newCash=+(currentProfile.cash+total).toFixed(2);
    await Promise.all([saveCash(newCash),savePosition(sym,0,pos.avg_price),saveTransaction('SELL',sym,pos.shares,px,total)]);
    render();
  });

  document.querySelectorAll('[data-ptab]').forEach(b=>b.onclick=()=>{posTab=b.dataset.ptab;render();});

  // Admin actions
  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.onclick=async()=>{
      const action=btn.dataset.action,uid=btn.dataset.uid;
      const profile=allProfiles.find(p=>p.id===uid);if(!profile)return;
      const inp=adminInputs[uid],amt=parseFloat(inp)||0;
      if(action==='set'&&amt>=0) await adminUpdateCash(uid,+amt.toFixed(2));
      else if(action==='add'&&amt>0) await adminUpdateCash(uid,+(profile.cash+amt).toFixed(2));
      else if(action==='sub'&&amt>0) await adminUpdateCash(uid,+Math.max(0,profile.cash-amt).toFixed(2));
      else if(action==='reset') await adminUpdateCash(uid,100000);
      else if(action==='promote') await adminSetAdmin(uid,true);
      else if(action==='demote') await adminSetAdmin(uid,false);
      render();
    };
  });

  document.querySelectorAll('[data-uid]').forEach(inp=>{
    inp.oninput=e=>{adminInputs[e.target.dataset.uid]=e.target.value;};
  });
}

    const pe=row.querySelector('.wl-price'),ce=row.querySelector('.wl-pct');
    if(pe)pe.textContent='$'+fmtN(p);
    if(ce){ce.textContent=pctS(c);ce.className='wl-pct '+cls;}
  });
  const sp=document.querySelector('.sym-price');
  if(sp){const p=prices[selectedSym],o=opens[selectedSym],c=pct(p,o);sp.textContent='$'+fmtN(p);const sc=document.querySelector('.sym-chg');if(sc){sc.textContent=pctS(c);sc.className='sym-chg '+(c>=0?'up':'dn');}}
  const nc=document.querySelector('.nav-cash b');if(nc)nc.textContent='$'+fmtN(currentProfile?.cash||0);
  const topS=['STI','BCII','BCOR','NDX','VTGS','MREN','CSTL','APBX','RXON','HAIM'];
  const nmxPx=topS.reduce((a,s)=>a+(prices[s]||0),0)/topS.length;
  const nmxC=pct(nmxPx,topS.reduce((a,s)=>a+(opens[s]||0),0)/topS.length);
  const idxEl=document.querySelector('.nav-idx');
  if(idxEl){const sp2=idxEl.querySelectorAll('span');if(sp2[1])sp2[1].textContent='$'+fmtN(nmxPx);if(sp2[2]){sp2[2].textContent=pctS(nmxC);sp2[2].style.color=nmxC>=0?'var(--green)':'var(--red)';}}
  const ti=document.querySelector('.tape-inner');
  if(ti){const ts=SYMS.slice(0,40).map(s=>{const p=prices[s],o=opens[s],c=pct(p,o),cls=c>=0?'up':'dn';return `<span class="ti ${cls}"><b>${s}</b> ${fmtN(p)} <span class="${cls}">${pctS(c)}</span></span>`;}).join('');ti.innerHTML=ts+ts;}
  if(chartTab==='CHART'){const ca=document.getElementById('chart-area');if(ca&&ca.querySelector('#candle-chart')){ca.innerHTML=renderChart(ALL[selectedSym],prices[selectedSym],pct(prices[selectedSym],opens[selectedSym]));}}
}
setInterval(tickUpdate,1500);

// ═══════════════════════════════════════════════════════════
//  BOOT — check for existing session
// ═══════════════════════════════════════════════════════════
(async()=>{
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    currentUser = session.user;
    await loadUserData(currentUser.id);
  }
  appLoading = false;
  render();
})();
</script>
